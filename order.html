<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="images/juji.png" />
    <title>Place New Order</title>
    <style>
      body {
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
      }
      div {
        width: 100%;
        border-radius: 20px;
        border: 1px solid;
        height: 90%;
        background: #f2f2f2;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      img {
        display: block;
        height: 50px;
        width: 50px;
      }
      p {
        font-size: 20px;
        font-weight: solid;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
    </style>
  </head>
  <body>
    <div>
      <img src="images/bag-shopping-regular-full.svg" alt="" />
      <p>You haven't placed any order</p>
    </div>
  </body>
</html>
